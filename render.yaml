# Render Blueprint — API only (no Python pipeline; run trends job locally/CI if needed).
# Connect this repo: Dashboard → New → Blueprint → connect GitHub, pick branch.
# Set secrets in the dashboard: DATABASE_URL, CORS_ORIGIN (and DATABASE_SSL for Neon, etc.).

services:
  - type: web
    name: resell-radar-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGIN
        sync: false
